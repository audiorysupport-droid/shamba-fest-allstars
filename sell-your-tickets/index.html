<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>List Your Event - ShambaFest</title>
    <style>
        :root {
            --primary-dark: #0f2214;
            --accent-red: #c92a2a;
            --bg-neutral: #f4f6f5;
            --font-sans: 'Montserrat', sans-serif;
        }
        body {
            font-family: var(--font-sans);
            background: var(--bg-neutral);
            margin: 0;
            padding: 40px 20px;
        }
        .form-container {
            background: #ffffff;
            max-width: 700px;
            margin: 0 auto;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
        }
        h2 { color: var(--primary-dark); margin-bottom: 10px; }
        .instructions { font-size: 0.9rem; color: #556258; margin-bottom: 30px; border-left: 3px solid var(--accent-red); padding-left: 10px;}
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px;}
        .field-block { display: flex; flex-direction: column; margin-bottom: 20px;}
        .field-block label { font-size: 0.85rem; font-weight: 600; margin-bottom: 8px; }
        .field-block input, .field-block textarea { padding: 12px; border: 1px solid #dcdfdc; border-radius: 6px; font-family: inherit;}
        .btn-post { background: var(--accent-red); color: white; border: none; padding: 15px; font-weight: 700; border-radius: 6px; cursor: pointer; text-transform: uppercase;}
    </style>
</head>
<body>

    <div class="form-container">
        <h2>List Your Event to Sell Tickets</h2>
        <div class="instructions">
            Provide your event details below. Event images should preferably be square dimensions (e.g., 330px by 320px) for consistent grid rendering.
        </div>

        <form id="eventUploadForm">
            <div class="field-block">
                <label>Event Name</label>
                <input type="text" id="eventName" required placeholder="e.g. Mombasa Seafood Festival">
            </div>
            <div class="field-block">
                <label>Event Description</label>
                <textarea id="eventDesc" rows="4" required placeholder="Describe the vibe, line up, and details..."></textarea>
            </div>
            <div class="form-row">
                <div class="field-block">
                    <label>Event Date & Time</label>
                    <input type="datetime-local" id="eventDateTime" required>
                </div>
                <div class="field-block">
                    <label>Ticket Base Price (KES)</label>
                    <input type="number" id="eventPrice" min="0" placeholder="0 for Free" required>
                </div>
            </div>
            <div class="field-block">
                <label>Event Venue / Location Address</label>
                <input type="text" id="eventVenue" required placeholder="e.g. Mama Ngina Waterfront, Mombasa">
            </div>
            <button type="submit" class="btn-post">Publish Event Entry</button>
        </form>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT_ID.appspot.com",
            messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        document.getElementById('eventUploadForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const eventPayload = {
                title: document.getElementById('eventName').value,
                description: document.getElementById('eventDesc').value,
                dateTime: document.getElementById('eventDateTime').value,
                price: parseFloat(document.getElementById('eventPrice').value),
                venue: document.getElementById('eventVenue').value,
                createdTime: new Date().toISOString()
            };

            try {
                await addDoc(collection(db, "events"), eventPayload);
                alert("Success! Your event listing request is online.");
                window.location.href = '/upcoming-events';
            } catch (error) {
                alert("Error saving record: " + error.message);
            }
        });
    </script>
</body>
</html>
